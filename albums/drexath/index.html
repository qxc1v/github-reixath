<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DREXATH</title>
  <link rel="icon" type="image/x-icon" href="../../reixath.jpg" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(0, 0, 0, 0.72), rgba(0, 0, 0, 0.78)),
        url("yedek_wallpaper.jpg"),
        url("yedek_wallpaper.png"),
        url("yedek_wallpaper.jpeg"),
        #121212;
      background-position: center, center, center, center, center;
      background-size: cover, cover, cover, cover, auto;
      background-repeat: no-repeat, no-repeat, no-repeat, no-repeat, no-repeat;
      color: #f2f2f2;
    }

    .back {
      position: fixed;
      top: 8px;
      left: 10px;
      border: 0;
      border-radius: 999px;
      background: rgba(36, 36, 36, 0.92);
      color: #eee;
      padding: 8px 12px;
      cursor: pointer;
      z-index: 20;
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 640px;
      gap: 0;
      padding: 56px 14px 18px;
      align-items: start;
    }

    .left-panel {
      background: rgba(16, 16, 16, 0.88);
      border-radius: 12px;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 12px;
    }

    .title {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .tracklist {
      display: grid;
      gap: 8px;
    }

    .track {
      width: 100%;
      background: #252525;
      color: #eee;
      border: 0;
      border-radius: 8px;
      padding: 9px 10px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
    }
    .track.active { background: #3a3a3a; }

    .player-card {
      align-self: start;
      background: linear-gradient(180deg, #222, #171717);
      border-radius: 12px;
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      overflow: hidden;
      background:
        linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.35)),
        url("bebek.jpg"),
        url("bebek.png"),
        url("bebek.jpeg"),
        #202020;
      background-position: center, center, center, center, center;
      background-size: cover, cover, cover, cover, auto;
      background-repeat: no-repeat, no-repeat, no-repeat, no-repeat, no-repeat;
    }

    .now-playing {
      font-size: 12px;
      min-height: 34px;
      line-height: 1.35;
      color: #f3f3f3;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      background: #303030;
      color: #eee;
      padding: 8px 11px;
      cursor: pointer;
      min-width: 40px;
      transition: transform .14s ease, background .14s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      background: #3a3a3a;
    }
    .btn#playBtn {
      background: #ececec;
      color: #121212;
      font-weight: 700;
    }

    .progress {
      width: 100%;
      height: 6px;
      background: #2f2f2f;
      border-radius: 999px;
      overflow: hidden;
      cursor: pointer;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: #f0f0f0;
    }

    .time {
      font-size: 11px;
      opacity: 0.85;
      text-align: center;
    }
    .volume {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .volume span { font-size: 11px; }
    .volume input {
      width: 100%;
      accent-color: #f0f0f0;
    }

    .credit {
      position: fixed;
      right: 10px;
      bottom: 10px;
      font-size: 13px;
      opacity: 0.9;
      cursor: pointer;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .left-panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <button class="back" onclick="goBack()">Geri Dön</button>

  <main class="layout">
    <section class="left-panel">
      <div>
        <h1 class="title">Tracklist</h1>
        <div class="tracklist" id="trackList">
          <button class="track" onclick="playTrack(0)">01. Track Name 01</button>
          <button class="track" onclick="playTrack(1)">02. Track Name 02</button>
          <button class="track" onclick="playTrack(2)">03. Track Name 03</button>
          <button class="track" onclick="playTrack(3)">04. Track Name 04</button>
          <button class="track" onclick="playTrack(4)">05. Track Name 05</button>
          <button class="track" onclick="playTrack(5)">06. Track Name 06</button>
          <button class="track" onclick="playTrack(6)">07. Track Name 07</button>
          <button class="track" onclick="playTrack(7)">08. Track Name 08</button>
          <button class="track" onclick="playTrack(8)">09. Track Name 09</button>
          <button class="track" onclick="playTrack(9)">10. Track Name 10</button>
        </div>
      </div>

      <aside class="player-card">
        <div class="cover" aria-label="album cover"></div>
        <div class="now-playing" id="nowPlaying">Parça seçilmedi</div>
        <div class="controls">
          <button class="btn" onclick="previousTrack()">&#9198;</button>
          <button class="btn" id="playBtn" onclick="togglePlayPause()">&#9654;</button>
          <button class="btn" onclick="nextTrack()">&#9197;</button>
        </div>
        <div class="progress" id="progressBar" onclick="seek(event)">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time" id="timeLabel">0:00 / 0:00</div>
        <div class="volume">
          <span>Vol</span>
          <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.7" onchange="setVolume(this.value)" />
        </div>
        <audio id="player"></audio>
      </aside>
    </section>
  </main>

  <div class="credit" onclick="window.open('https://www.instagram.com/reixath/', '_blank')">design by reixath</div>

  <script>
    const tracks = [
      { title: "Track Name 01", src: null },
      { title: "Track Name 02", src: null },
      { title: "Track Name 03", src: null },
      { title: "Track Name 04", src: null },
      { title: "Track Name 05", src: null },
      { title: "Track Name 06", src: null },
      { title: "Track Name 07", src: null },
      { title: "Track Name 08", src: null },
      { title: "Track Name 09", src: null },
      { title: "Track Name 10", src: null }
    ];

    const player = document.getElementById("player");
    const playBtn = document.getElementById("playBtn");
    const nowPlaying = document.getElementById("nowPlaying");
    const progressBar = document.getElementById("progressBar");
    const progressFill = document.getElementById("progressFill");
    const timeLabel = document.getElementById("timeLabel");
    const trackButtons = Array.from(document.querySelectorAll(".track"));
    let currentTrackIndex = -1;

    player.volume = 0.7;

    function setActive(index) {
      trackButtons.forEach((btn, i) => btn.classList.toggle("active", i === index));
    }

    function playTrack(index) {
      const item = tracks[index];
      if (!item) return;
      currentTrackIndex = index;
      setActive(index);
      nowPlaying.textContent = item.title;

      if (!item.src) {
        player.pause();
        updatePlayButton(false);
        return;
      }

      player.src = item.src;
      player.play().catch(() => {});
      updatePlayButton(true);
    }

    function togglePlayPause() {
      if (!player.src) {
        if (currentTrackIndex < 0) playTrack(0);
        return;
      }
      if (player.paused) player.play().catch(() => {});
      else player.pause();
    }

    function nextTrack() {
      if (currentTrackIndex < 0) return;
      const next = currentTrackIndex + 1;
      if (next < tracks.length) playTrack(next);
    }

    function previousTrack() {
      if (currentTrackIndex <= 0) return;
      playTrack(currentTrackIndex - 1);
    }

    function setVolume(value) {
      player.volume = Number(value);
    }

    function seek(event) {
      if (!player.duration) return;
      const rect = progressBar.getBoundingClientRect();
      const percent = (event.clientX - rect.left) / rect.width;
      player.currentTime = percent * player.duration;
    }

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }

    function updatePlayButton(isPlaying) {
      playBtn.innerHTML = isPlaying ? "&#10074;&#10074;" : "&#9654;";
    }

    player.addEventListener("timeupdate", () => {
      const percent = player.duration ? (player.currentTime / player.duration) * 100 : 0;
      progressFill.style.width = percent + "%";
      timeLabel.textContent = `${formatTime(player.currentTime)} / ${formatTime(player.duration)}`;
    });

    player.addEventListener("play", () => updatePlayButton(true));
    player.addEventListener("pause", () => updatePlayButton(false));

    function goBack() {
      window.location.href = "../../start.html";
    }
  </script>
</body>
</html>
